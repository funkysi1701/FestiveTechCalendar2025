name: Test to Main
permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  schedule:
    - cron: '40 17 */7 * *'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%d %b %Y')" >> "$GITHUB_OUTPUT"

      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: test

      - name: Fetch main branch
        run: git fetch origin main:refs/remotes/origin/main

      - name: Check for commits between test and main
        id: check_commits
        run: |
          if [ -z "$(git log origin/main..HEAD --oneline)" ]; then
            echo "No commits between test and main. Skipping PR creation."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request (test -> main)
        if: steps.check_commits.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          title="Release ${{ steps.date.outputs.date }} Test to Main"
          body="Created by Github action"

          # Find an *open* PR from test -> main
          pr_number="$(gh pr list --state open --head test --base main --json number --jq '.[0].number // empty')"

          if [ -z "$pr_number" ]; then
            gh pr create --base main --head test --title "$title" --body "$body"
          else
            gh pr edit "$pr_number" --title "$title" --body "$body"
          fi
